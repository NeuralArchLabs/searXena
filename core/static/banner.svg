<svg viewBox="0 0 650 160" xmlns="http://www.w3.org/2000/svg" aria-label="searXena Mascot Banner">
    <style>
        /* Tipografía Premium local para emular Outfit */
        .text-searxena-wrapper {
            animation: morphSearxena 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            transform-origin: center;
            font-family: 'Outfit', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 800;
            letter-spacing: -3.5px;
            fill: url(#neonGrad);
        }

        .text-dog-wrapper {
            animation: morphDog 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            transform-origin: center;
            opacity: 0;
            fill: url(#neonGrad);
        }

        .mag-glass {
            animation: sweepGlass 6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            transform-origin: center;
            opacity: 0;
        }

        .dog-eye {
            animation: blinkEye 4s infinite;
            transform-origin: center;
            transform-box: fill-box;
        }

        .dog-nose-path {
            animation: sniff 0.25s infinite alternate ease-in-out;
            transform-origin: center;
            transform-box: fill-box;
        }

        @keyframes blinkEye {
            0%, 46%, 54%, 100% { opacity: 1; transform: scaleY(1); }
            50% { opacity: 0; transform: scaleY(0.1); }
        }

        @keyframes sniff {
            from { transform: translateY(0px) scale(1); }
            to { transform: translateY(-1.5px) scale(1.02); }
        }

        @keyframes sweepGlass {
            0%, 15% { transform: translate(145px, 8px); opacity: 0; }
            20% { transform: translate(145px, 8px); opacity: 1; }
            35%, 65% { transform: translate(-115px, 8px); opacity: 1; }
            80% { transform: translate(145px, 8px); opacity: 1; }
            85%, 100% { transform: translate(145px, 8px); opacity: 0; }
        }

        @keyframes morphSearxena {
            0%, 15% { opacity: 1; filter: blur(0px); transform: scale(1); }
            35%, 65% { opacity: 0; filter: blur(10px); transform: scale(0.95); }
            85%, 100% { opacity: 1; filter: blur(0px); transform: scale(1); }
        }

        @keyframes morphDog {
            0%, 15% { opacity: 0; filter: blur(10px); transform: scale(0.95); }
            33% { opacity: 1; filter: blur(0px); transform: scale(1.08) rotate(-2deg); }
            45%, 55% { opacity: 1; filter: blur(0px); transform: scale(1) rotate(0deg); }
            67% { opacity: 1; filter: blur(0px); transform: scale(1.08) rotate(2deg); }
            85%, 100% { opacity: 0; filter: blur(10px); transform: scale(0.95); }
        }
    </style>

    <defs>
        <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#818cf8" />
            <stop offset="50%" stop-color="#c084fc" />
            <stop offset="100%" stop-color="#e879f9" />
        </linearGradient>
    </defs>

    <g transform="translate(325, 80)">
        <!-- Lupa (mag-glass) -->
        <g class="mag-glass">
            <circle cx="0" cy="0" r="14" fill="none" stroke="url(#neonGrad)" stroke-width="4" />
            <line x1="10" y1="10" x2="24" y2="24" stroke="url(#neonGrad)" stroke-width="4" stroke-linecap="round" />
        </g>

        <!-- Texto searXena -->
        <g class="text-searxena-wrapper">
            <text x="0" y="0" text-anchor="middle" dominant-baseline="central" font-size="80">
                searXena
            </text>
        </g>

        <!-- Mascota Vectorizada (Morphing) -->
        <g class="text-dog-wrapper" transform="translate(18, 2)">
            <!-- Oreja Izquierda (V) -->
            <path d="M -45 -15 L -35 15 L -25 -15" fill="none" stroke="url(#neonGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
            
            <!-- Ojo Izquierdo (•) -->
            <circle class="dog-eye" cx="-12" cy="0" r="4.5" fill="url(#neonGrad)" />
            
            <!-- Hocico Vectorizado (ᴥ) - Recreación del carácter U+1D1D -->
            <path class="dog-nose-path" d="M -4 2 C -4 8, 0 8, 0 2 C 0 8, 4 8, 4 2" fill="none" stroke="url(#neonGrad)" stroke-width="6" stroke-linecap="round" />
            
            <!-- Ojo Derecho (•) -->
            <circle class="dog-eye" cx="12" cy="0" r="4.5" fill="url(#neonGrad)" />
            
            <!-- Oreja Derecha (V) -->
            <path d="M 25 -15 L 35 15 L 45 -15" fill="none" stroke="url(#neonGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
        </g>
    </g>
</svg>
