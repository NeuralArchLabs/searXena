<html lang="es">

<head>

    <title>searXena Pro - Privacidad Total</title>

    <link rel="stylesheet" href="/static/style.css?v=2.5">
    <meta name="referrer" content="no-referrer">
</head>

<body>
    <!-- El botón de preferencias ahora usa la clase settings-btn (Top Right) -->
    <a href="/settings" class="settings-btn" title="Configurar motores y privacidad">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path
                d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" />

        </svg>
        Preferencias

    <div class="home-container">
        <h1 class="logo-main">searXena</h1>
        <div class="search-box">
            <form action="/search" method="get" id="search-form">
                <input type="text" name="q" class="search-input" id="search-input" placeholder="¿Qué estás buscando?"
                    autocomplete="off" autofocus title="Búsqueda privada">
                <input type="hidden" name="category" id="cat-input" value="general">
                <div id="suggestions-box"></div>
            </form>
        </div>

        <div class="text-muted" style="margin-top: 30px; font-size: 0.85rem; opacity: 0.7;">
            Sin rastreo. Sin publicidad. Solo resultados.
        </div>
    </div>

    <footer class="footer">
        <p>Copyright © 2026 searXena Pro — Developed by <a href="https://github.com/martinezpalomera92"
                class="credit-link" target="_blank" rel="noopener noreferrer">Neural Arch Labs</a></p>

    <script src="/static/main.js?v=2.5"></script>
